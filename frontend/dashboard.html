<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                    </svg>
                    <span>Pulse</span>
                </div>
            </div>

            <nav class="nav-links">
                <a href="#" class="nav-item active" data-target="dashboard-view">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="9"></rect>
                        <rect x="14" y="3" width="7" height="5"></rect>
                        <rect x="14" y="12" width="7" height="9"></rect>
                        <rect x="3" y="16" width="7" height="5"></rect>
                    </svg>
                    Dashboard
                </a>
                <a href="#" class="nav-item" data-target="alerts-view">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    Alerts
                </a>
            </nav>

            <div class="user-block">
                <div class="user-email" id="user-display">user@example.com</div>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content-area">
            <!-- Loading Overlay -->
            <div id="page-loader" class="loader-overlay hidden">
                <div class="spinner"></div>
            </div>

            <!-- Dashboard View -->
            <section id="dashboard-view" class="view-section active">
                <header class="view-header">
                    <h2>Market Overview</h2>
                    <button class="btn-primary btn-sm" id="btn-add-stock">+ Add Stock</button>
                </header>

                <div id="stock-grid" class="stock-grid">
                    <!-- Stock cards injected here via JS -->
                    <div class="empty-state" id="empty-stocks">
                        <p>You aren't tracking any stocks.</p>
                        <button class="btn-link" onclick="document.getElementById('btn-add-stock').click()">Add your
                            first stock</button>
                    </div>
                </div>
            </section>

            <!-- Alerts View -->
            <section id="alerts-view" class="view-section hidden">
                <header class="view-header">
                    <h2>Price Alerts</h2>
                    <button class="btn-primary btn-sm" id="btn-create-alert">+ Create Alert</button>
                </header>

                <div class="alerts-table-container">
                    <table class="alerts-table">
                        <thead>
                            <tr>
                                <th>Symbol</th>
                                <th>Target Condition</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="alerts-tbody">
                            <!-- Alert rows injected here -->
                        </tbody>
                    </table>
                    <div class="empty-state hidden" id="empty-alerts">
                        <p>No active price alerts.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <!-- Add Stock Modal -->
    <div id="modal-search" class="modal-backdrop hidden">
        <div class="modal">
            <div class="modal-header">
                <h3>Search Stock</h3>
                <button class="btn-close" onclick="closeModal('modal-search')">✕</button>
            </div>
            <div class="modal-body">
                <input type="text" id="search-input" placeholder="Search symbol or company name...">
                <div id="search-results" class="search-results">
                    <!-- Results injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Create Alert Modal -->
    <div id="modal-alert" class="modal-backdrop hidden">
        <div class="modal">
            <div class="modal-header">
                <h3>Set Price Alert</h3>
                <button class="btn-close" onclick="closeModal('modal-alert')">✕</button>
            </div>
            <div class="modal-body">
                <form id="form-create-alert">
                    <div class="input-group">
                        <label>Symbol</label>
                        <!-- In real app could be a dropdown of tracked stocks, for simplicity just input -->
                        <input type="text" id="alert-symbol" required placeholder="e.g. RELIANCE">
                        <input type="hidden" id="alert-company">
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label>Condition</label>
                            <select id="alert-condition" class="form-select">
                                <option value="ABOVE">Above</option>
                                <option value="BELOW">Below</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label>Target Price</label>
                            <input type="number" step="0.01" id="alert-price" required placeholder="e.g. 2500.00">
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" style="margin-top: 10px;">Save Alert</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/stockWidget.js"></script>
    <script src="js/alerts.js"></script>
</body>

</html>
