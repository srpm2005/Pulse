spring.application.name=pulse
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=jdbc:postgresql://${NEON_HOST:neon-host}/${NEON_DB:db}?sslmode=require
spring.datasource.username=${NEON_USER:neon-user}
spring.datasource.password=${NEON_PASSWORD:neon-password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:placeholder-random-base64-256bit-key-must-be-updated}
jwt.expiration-ms=86400000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USER:your-email@gmail.com}
spring.mail.password=${GMAIL_APP_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

alert.scheduler.cron=0 * * * * *
