spring.application.name=pulse
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=jdbc:postgresql://${NEON_HOST:neon-host}/${NEON_DB:db}?sslmode=require
spring.datasource.username=${NEON_USER:neon-user}
spring.datasource.password=${NEON_PASSWORD:neon-password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:placeholder-random-base64-256bit-key-must-be-updated}
jwt.expiration-ms=86400000

alphavantage.api.key=${ALPHAVANTAGE_API_KEY}
alphavantage.base-url=https://www.alphavantage.co/query

resend.api.key=${RESEND_API_KEY:your-resend-api-key}
resend.from-email=alerts@yourdomain.com

alert.scheduler.cron=0 * * * * *
